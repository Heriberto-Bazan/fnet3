<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS - FNET3</title>
    <link rel="stylesheet" href="/css/pos.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Punto de Venta</h1>
        <p>Sistema POS — FNET3</p>
    </div>

    <div class="section">
        <div class="section-title">Datos del Cliente</div>
        <div id="loading" class="loading">Cargando datos del cliente...</div>
        <div id="cliente-info" style="display:none">
            <div class="cliente-grid">
                <div class="campo">
                    <label>Nombre</label>
                    <span id="nombre">—</span>
                </div>
                <div class="campo">
                    <label>Apellido</label>
                    <span id="apellido">—</span>
                </div>
                <div class="campo">
                    <label>Puntos</label>
                    <span id="puntos">—</span>
                </div>
                <div class="campo">
                    <label>ID Cliente</label>
                    <span id="customerID">—</span>
                </div>
            </div>
        </div>
    </div>


    <div class="section">
        <div class="section-title">Realizar Venta</div>
        <div class="form-group">
            <label>Monto ($)</label>
            <input type="text" id="totalMoney" placeholder="1,500.00">
        </div>
        <div class="form-group">
            <label>Nota</label>
            <input type="text" id="notes" placeholder="Mensaje de la operacion">
        </div>
        <button class="btn-venta" id="btnVenta" disabled>Realizar Venta</button>
        <div class="resultado" id="resultado"></div>
    </div>

   
    <div class="section" style="padding-top: 0; border-bottom: none;">
        <button class="btn-nueva" id="btnNueva" style="display:none">
            + Nueva Operacion
        </button>
    </div>

   
    <div class="section" id="historial-section" style="display:none">
        <div class="section-title">Historial de la sesion</div>
        <div id="historial-lista"></div>
    </div>

</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="/js/pos.js"></script>

</body>
</html>
